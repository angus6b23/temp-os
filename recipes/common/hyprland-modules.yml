modules:
  - type: rpm-ostree
    install:
      - waybar
      - wlogout
      - wlsunset
      - swaylock

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/sdegler/hyprland/repo/fedora-43/sdegler-hyprland-fedora-43.repo 
    install:
      - hyprland
      - hyprpanel
      - xdg-desktop-portal-hyprland
      - hyprlock
      - hyprpicker
      - hypridle
      - hyprpolkitagent
      - hyprshot
      - satty
      - swww
      - cliphist

  - type: files
    files:
      - source: system/hyprland
        destination: /

  - type: script
    scripts:
      - removeunprofessionalwallpapers.sh
      - sethyprlandwaybarmodules.sh
