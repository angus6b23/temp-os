modules:
  - type: script
    scripts:
      - enableTerra.sh

  - type: dnf
    repos:
      copr:
        - sdegler/hyprland
    install:
      packages:
        - waybar
        - wlogout
        - wlsunset
        - swaylock
        - hyprland
        - xdg-desktop-portal-hyprland
        - hyprlock
        - hyprpicker
        - hypridle
        - hyprpolkitagent
        - hyprshot
        - satty
        - swww
        - cliphist
        - noctalia-shell

  - type: files
    files:
      - source: system/hyprland
        destination: /

  - type: script
    scripts:
      - removeunprofessionalwallpapers.sh
      - sethyprlandwaybarmodules.sh
